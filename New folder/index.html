<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rider Agent Monitoring | Calendar + Red for Tomorrow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #e8f3ec;
            padding: 28px 20px;
        }

        .monitor-container {
            max-width: 1480px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        /* GREEN & WHITE THEME */
        .header {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            padding: 1.5rem 2rem;
            color: white;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .badge-api {
            background: #4caf50;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-family: monospace;
            color: white;
        }

        .sub {
            color: #d4f5d0;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .content-panel {
            padding: 28px 30px 38px;
        }

        /* SEARCH & FILTER */
        .search-area {
            margin-bottom: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 14px 20px;
            font-size: 1rem;
            border: 1px solid #c8e6c9;
            border-radius: 60px;
            background: #f9fbfe;
            outline: none;
        }

        .search-input:focus {
            border-color: #2e7d32;
            box-shadow: 0 4px 14px rgba(46,125,50,0.15);
        }

        .month-filter {
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid #c8e6c9;
            background: white;
            font-weight: 500;
        }

        /* FORM GRID */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            background: #f8fafd;
            padding: 22px 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            border: 1px solid #e6edf4;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2e7d32;
        }

        .form-grid input, .form-grid select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 20px;
            border: 1px solid #c8e6c9;
            background: white;
            font-size: 0.9rem;
            outline: none;
        }

        .form-grid input:focus, .form-grid select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 28px;
            align-items: center;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #2e7d32;
            color: white;
        }

        .btn-primary:hover {
            background: #1b5e20;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #eef2f8;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
        }

        .btn-danger {
            background: #fff0f0;
            color: #bc3f33;
            border: 1px solid #f3cdcd;
        }

        /* ========== CALENDAR LIST VIEW ========== */
        .calendar-list-container {
            max-height: 600px;
            overflow-y: auto;
            border-radius: 24px;
            border: 1px solid #e8f5e9;
            background: #ffffff;
        }

        .calendar-year-group {
            margin-bottom: 24px;
        }

        .year-header {
            background: #2e7d32;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            margin: 16px 12px 12px 12px;
            display: inline-block;
        }

        .month-group {
            margin: 8px 16px 24px 16px;
            border-left: 4px solid #4caf50;
            background: #f9fef7;
            border-radius: 20px;
            overflow: hidden;
        }

        .month-title {
            background: #e8f5e9;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1b5e20;
            border-bottom: 2px solid #c8e6c9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-title span {
            background: #2e7d32;
            color: white;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .calendar-day-card {
            background: white;
            margin: 12px 16px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e0f2e9;
            transition: 0.1s;
        }

        /* 🔴 RED BACKGROUND FOR TOMORROW'S DATE CARD */
        .calendar-day-card.tomorrow-card {
            background: #ffe6e6;
            border: 2px solid #e53935;
            box-shadow: 0 4px 12px rgba(229,57,53,0.2);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: #fafdf8;
            border-bottom: 1px solid #e8f5e9;
            font-weight: 600;
            color: #2e7d32;
            border-radius: 20px 20px 0 0;
        }

        .tomorrow-card .day-header {
            background: #ffcccc;
            color: #b71c1c;
        }

        .day-date {
            font-size: 1rem;
        }

        .day-badge {
            background: #e8f5e9;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
        }

        .tomorrow-card .day-badge {
            background: #ef9a9a;
            color: #b71c1c;
        }

        .event-list {
            padding: 8px 0;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #f0f7ec;
            transition: 0.1s;
            flex-wrap: wrap;
            gap: 8px;
        }

        .event-item:hover {
            background: #f1f9f0;
        }

        /* 🔴 RED BACKGROUND FOR INDIVIDUAL EVENT IF TOMORROW (fallback) */
        .event-item.tomorrow-event {
            background: #ffe0e0;
            border-left: 4px solid #e53935;
        }

        .event-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            flex: 2;
        }

        .event-rider {
            font-weight: 700;
            color: #1e3a2f;
            min-width: 140px;
        }

        .event-agent {
            color: #5e6f5e;
            font-size: 0.8rem;
        }

        .event-location {
            background: #eef2f8;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .event-company {
            background: #e0f2fe;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .status-badge-cal {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.7rem;
        }

        .status-scheduled { background: #fff1db; color: #b85c00; }
        .status-onroute { background: #e0f2fe; color: #0369a1; }
        .status-completed { background: #e0f2e9; color: #166534; }

        .event-actions {
            display: flex;
            gap: 8px;
        }

        .cal-btn {
            padding: 5px 12px;
            border-radius: 30px;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 500;
        }

        .cal-edit {
            background: #ffb347;
            color: #2d2b26;
        }

        .cal-delete {
            background: #e53e3e;
            color: white;
        }

        .empty-calendar {
            text-align: center;
            padding: 60px 20px;
            color: #7d9e7a;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.75rem;
            text-align: center;
            color: #2e7d32;
            background: #f1f9f0;
            padding: 14px;
            border-radius: 60px;
        }

        .tomorrow-badge-small {
            background: #e53935;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="monitor-container">
    <div class="header">
        <h1>
            🏍️ Rider Agent Monitoring · Calendar List
            <span class="badge-api">🔴 MAG-RED KUNG UGMA ANG SCHEDULE</span>
        </h1>
        <div class="sub">🗓️ Calendar view · Mag-red ang card kung ang rider's date kay tomorrow (ugma) · Green & White Theme</div>
    </div>

    <div class="content-panel">
        <div class="search-area">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by rider, agent, company, location..." onkeyup="renderCalendarView()">
            <select id="monthSelectFilter" class="month-filter" onchange="renderCalendarView()">
                <option value="all">📆 All Months</option>
                <option value="Enero">Enero (January)</option><option value="Pebrero">Pebrero (February)</option>
                <option value="Marso">Marso (March)</option><option value="Abril">Abril (April)</option>
                <option value="Mayo">Mayo (May)</option><option value="Hunyo">Hunyo (June)</option>
                <option value="Hulyo">Hulyo (July)</option><option value="Agosto">Agosto (August)</option>
                <option value="Setyembre">Setyembre (September)</option><option value="Oktubre">Oktubre (October)</option>
                <option value="Nobyembre">Nobyembre (November)</option><option value="Disyembre">Disyembre (December)</option>
            </select>
        </div>

        <div class="form-grid">
            <input type="hidden" id="recordId">
            <div class="form-group"><label>🏍️ RIDER</label><input id="riderName" placeholder="Rider Name"></div>
            <div class="form-group"><label>🤝 AGENT</label><input id="agentName" placeholder="Agent Name"></div>
            <div class="form-group"><label>📍 LOCATION</label><input id="location" placeholder="Location"></div>
            <div class="form-group"><label>📅 DATE (kanus-a)</label><input type="date" id="scheduleDate"></div>
            <div class="form-group"><label>📆 BULAN</label><select id="scheduleMonth"><option>Enero</option><option>Pebrero</option><option>Marso</option><option>Abril</option><option>Mayo</option><option>Hunyo</option><option>Hulyo</option><option>Agosto</option><option>Setyembre</option><option>Oktubre</option><option>Nobyembre</option><option>Disyembre</option></select></div>
            <div class="form-group"><label>📌 STATUS</label><select id="status"><option>Scheduled</option><option>On Route</option><option>Completed</option></select></div>
            <div class="form-group"><label>🏢 COMPANY</label><select id="company"><option>BDO</option><option>BPI</option><option>EWB</option><option>RCBC</option><option>Shopee</option><option>MCC</option></select></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveRider()">💾 Save (Add/Update)</button>
            <button class="btn btn-secondary" onclick="resetForm()">🔄 Clear Form</button>
            <button class="btn btn-danger" onclick="deleteAllRecords()">🗑️ Delete All</button>
        </div>

        <!-- CALENDAR CONTAINER -->
        <div class="calendar-list-container" id="calendarContainer">
            <div class="empty-calendar">📅 Loading calendar...</div>
        </div>

        <div class="footer-note">
            ✅ <strong>🔴 RED = Tomorrow's schedule (ugma ang byahe)</strong> · Group by Year/Month/Date · Edit/Delete any rider
        </div>
    </div>
</div>

<script>
    const API_ENDPOINT = "https://695cfcb879f2f34749d695a2.mockapi.io/rider-agent";
    let globalRiders = [];

    // Helper: Check if date is tomorrow (ugma)
    function isTomorrow(dateString) {
        if (!dateString) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        
        const inputDate = new Date(dateString);
        if (isNaN(inputDate.getTime())) return false;
        inputDate.setHours(0, 0, 0, 0);
        
        return inputDate.getTime() === tomorrow.getTime();
    }

    async function fetchAllRiders() {
        try {
            const res = await fetch(API_ENDPOINT);
            if (!res.ok) throw new Error();
            let data = await res.json();
            globalRiders = data.map(r => ({ ...r, scheduleDate: r.scheduleDate || "", scheduleMonth: r.scheduleMonth || "Enero" }));
            renderCalendarView();
            triggerNotification();
        } catch(err) {
            document.getElementById("calendarContainer").innerHTML = `<div class="empty-calendar">⚠️ Cannot connect to MockAPI</div>`;
        }
    }

    function groupByCalendar(riders) {
        const grouped = new Map();
        riders.forEach(rider => {
            let dateStr = rider.scheduleDate;
            let monthName = rider.scheduleMonth || "Enero";
            let year = dateStr && dateStr.includes("-") ? dateStr.split("-")[0] : "TBA";
            if (!grouped.has(year)) grouped.set(year, new Map());
            const yearMap = grouped.get(year);
            if (!yearMap.has(monthName)) yearMap.set(monthName, new Map());
            const monthMap = yearMap.get(monthName);
            const displayDate = dateStr && dateStr !== "" ? dateStr : "No specific date";
            if (!monthMap.has(displayDate)) monthMap.set(displayDate, []);
            monthMap.get(displayDate).push(rider);
        });
        const sortedYears = Array.from(grouped.keys()).sort((a,b) => {
            if (a === "TBA") return 1; if (b === "TBA") return -1;
            return b.localeCompare(a);
        });
        return { grouped, sortedYears };
    }

    function renderCalendarView() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const monthFilter = document.getElementById("monthSelectFilter").value;
        
        let filtered = [...globalRiders];
        if (searchTerm) {
            filtered = filtered.filter(r => 
                (r.riderName && r.riderName.toLowerCase().includes(searchTerm)) ||
                (r.agentName && r.agentName.toLowerCase().includes(searchTerm)) ||
                (r.company && r.company.toLowerCase().includes(searchTerm)) ||
                (r.location && r.location.toLowerCase().includes(searchTerm))
            );
        }
        if (monthFilter !== "all") {
            filtered = filtered.filter(r => r.scheduleMonth === monthFilter);
        }
        
        if (filtered.length === 0) {
            document.getElementById("calendarContainer").innerHTML = `<div class="empty-calendar">📭 No events match.</div>`;
            return;
        }
        
        const { grouped, sortedYears } = groupByCalendar(filtered);
        let html = `<div class="calendar-list-wrapper">`;
        const monthOrder = ["Enero","Pebrero","Marso","Abril","Mayo","Hunyo","Hulyo","Agosto","Setyembre","Oktubre","Nobyembre","Disyembre"];
        
        for (let year of sortedYears) {
            const yearMap = grouped.get(year);
            html += `<div class="calendar-year-group"><div class="year-header">📅 ${year}</div>`;
            const sortedMonths = Array.from(yearMap.keys()).sort((a,b) => monthOrder.indexOf(a) - monthOrder.indexOf(b));
            
            for (let month of sortedMonths) {
                const dateMap = yearMap.get(month);
                const totalEvents = Array.from(dateMap.values()).reduce((acc, arr) => acc + arr.length, 0);
                html += `<div class="month-group"><div class="month-title">📆 ${month} <span>${totalEvents} ride(s)</span></div>`;
                
                const sortedDates = Array.from(dateMap.keys()).sort((a,b) => {
                    if (a === "No specific date") return 1; if (b === "No specific date") return -1;
                    return b.localeCompare(a);
                });
                
                for (let dateKey of sortedDates) {
                    const events = dateMap.get(dateKey);
                    // Check if this date is TOMORROW (ugma)
                    let isDateTomorrow = false;
                    if (dateKey !== "No specific date" && dateKey !== "") {
                        isDateTomorrow = isTomorrow(dateKey);
                    }
                    const tomorrowClass = isDateTomorrow ? "tomorrow-card" : "";
                    
                    html += `<div class="calendar-day-card ${tomorrowClass}">
                                <div class="day-header">
                                    <span class="day-date">📌 ${dateKey} ${isDateTomorrow ? '<span class="tomorrow-badge-small">🔴 UGMA NA!</span>' : ''}</span>
                                    <span class="day-badge">${events.length} rider(s)</span>
                                </div>
                                <div class="event-list">`;
                    
                    events.forEach(rider => {
                        let statusClass = rider.status === "Scheduled" ? "status-scheduled" : (rider.status === "On Route" ? "status-onroute" : "status-completed");
                        // Additional per-event red if tomorrow (optional consistency)
                        const eventTomorrowClass = isDateTomorrow ? "tomorrow-event" : "";
                        html += `
                            <div class="event-item ${eventTomorrowClass}">
                                <div class="event-info">
                                    <span class="event-rider">🏍️ ${escapeHtml(rider.riderName || "?")}</span>
                                    <span class="event-agent">🤝 ${escapeHtml(rider.agentName || "")}</span>
                                    <span class="event-location">📍 ${escapeHtml(rider.location || "")}</span>
                                    <span class="event-company">🏢 ${escapeHtml(rider.company || "")}</span>
                                    <span class="status-badge-cal ${statusClass}">${escapeHtml(rider.status || "Scheduled")}</span>
                                    ${isDateTomorrow ? '<span style="background:#e53935; color:white; padding:2px 8px; border-radius:20px; font-size:0.6rem;">🔴 UGMA</span>' : ''}
                                </div>
                                <div class="event-actions">
                                    <button class="cal-btn cal-edit" onclick="editRider('${rider.id}')">✏️ Edit</button>
                                    <button class="cal-btn cal-delete" onclick="deleteRider('${rider.id}')">🗑️ Del</button>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        html += `</div>`;
        document.getElementById("calendarContainer").innerHTML = html;
    }

    async function saveRider() {
        const id = document.getElementById("recordId").value;
        const riderName = document.getElementById("riderName").value.trim();
        const agentName = document.getElementById("agentName").value.trim();
        const location = document.getElementById("location").value.trim();
        const scheduleDate = document.getElementById("scheduleDate").value;
        const scheduleMonth = document.getElementById("scheduleMonth").value;
        const status = document.getElementById("status").value;
        const company = document.getElementById("company").value;
        if (!riderName || !agentName || !location) { alert("Please fill Rider, Agent and Location"); return; }
        const payload = { riderName, agentName, location, scheduleDate, scheduleMonth, status, company };
        try {
            if (id) {
                await fetch(`${API_ENDPOINT}/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            } else {
                await fetch(API_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            }
            resetForm();
            await fetchAllRiders();
        } catch(err) { alert("Save error"); }
    }
    
    async function deleteRider(id) {
        if (!confirm("Delete this rider?")) return;
        await fetch(`${API_ENDPOINT}/${id}`, { method: "DELETE" });
        await fetchAllRiders();
    }
    
    async function deleteAllRecords() {
        if (!confirm("DELETE ALL RIDERS? Permanent.")) return;
        for (let r of globalRiders) await fetch(`${API_ENDPOINT}/${r.id}`, { method: "DELETE" });
        await fetchAllRiders();
    }
    
    function editRider(id) {
        const rider = globalRiders.find(r => r.id == id);
        if (!rider) return;
        document.getElementById("recordId").value = rider.id;
        document.getElementById("riderName").value = rider.riderName;
        document.getElementById("agentName").value = rider.agentName;
        document.getElementById("location").value = rider.location;
        document.getElementById("scheduleDate").value = rider.scheduleDate || "";
        document.getElementById("scheduleMonth").value = rider.scheduleMonth || "Enero";
        document.getElementById("status").value = rider.status;
        document.getElementById("company").value = rider.company;
        document.querySelector(".form-grid").scrollIntoView({ behavior: "smooth" });
    }
    
    function resetForm() {
        document.getElementById("recordId").value = "";
        document.getElementById("riderName").value = "";
        document.getElementById("agentName").value = "";
        document.getElementById("location").value = "";
        document.getElementById("scheduleDate").value = "";
        document.getElementById("scheduleMonth").value = "Enero";
        document.getElementById("status").value = "Scheduled";
        document.getElementById("company").value = "BDO";
    }
    
    function triggerNotification() {
        const tomorrowRiders = globalRiders.filter(r => isTomorrow(r.scheduleDate));
        if (tomorrowRiders.length && Notification.permission === "granted") {
            new Notification("🔴 Ugma na ang biyahe!", { body: `${tomorrowRiders.length} rider(s) ang naay schedule UGMA. Check calendar.` });
        }
    }
    
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    window.saveRider = saveRider; window.deleteRider = deleteRider; window.editRider = editRider; window.resetForm = resetForm; window.deleteAllRecords = deleteAllRecords; window.renderCalendarView = renderCalendarView;
    
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        document.body.addEventListener("click", () => Notification.requestPermission(), { once: true });
    }
    
    fetchAllRiders();
</script>
</body>
</html>
